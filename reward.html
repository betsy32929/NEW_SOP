function normalizePersonName(v){ return String(v || '').trim().replace(/\s+/g,''); }

}

  const normalized = normalizePersonName(name);

  if(COMMON_DOUBLE_SURNAMES.some(s => normalized.startsWith(s))) return true;
  return COMMON_SINGLE_SURNAMES.has(normalized.charAt(0));
}
function getNamePlausibilityScore(name){
  const normalized = normalizePersonName(name);
  if(!normalized) return 999;
  let score = 0;
  if(!startsWithCommonSurname(normalized)) score += 20;
  if(normalized.length === 2) score += 3;
  if(normalized.length === 4) score += 1;
  if(normalized.length < 2 || normalized.length > 4) score += 50;
  return score;
}
function splitUnknownDeveloperString(raw){
  const normalized = normalizePersonName(raw);

    const first2 = normalized.slice(0,2), last3 = normalized.slice(2), first3 = normalized.slice(0,3), last2 = normalized.slice(3);

  const memo = new Map();
  function solve(start){
    if(start === normalized.length) return { parts: [], score: 0 };
    if(memo.has(start)) return memo.get(start);

    [4,3,2].forEach(len => {
      if(start + len > normalized.length) return;
      const head = normalized.slice(start, start + len);
      const tail = solve(start + len);

  }

}
function getKnownDeveloperNames(){

}
function splitDeveloperNames(raw){

}
function getRewardDeveloperList(raw){ return [...new Set(splitDeveloperNames(raw).map(canonicalDeveloperName).filter(Boolean))]; }
function isRewardAutoExcludedName(name){ return REWARD_AUTO_EXCLUDED_NAMES.includes(canonicalDeveloperName(name)); }
function getRewardUnpaidNames(){ ensureRewardConfig(); const source = Array.isArray(state.rewardConfig.unpaidNames) && state.rewardConfig.unpaidNames.length ? state.rewardConfig.unpaidNames : REWARD_DEFAULT_UNPAID_NAMES; return [...new Set(source.map(canonicalDeveloperName).filter(Boolean))]; }

}

function normalizeRocDate(raw){
  let v = String(raw || '').trim();

  if(entryDate && !isRocDateBetween(entryDate,cfg.startDate,cfg.endDate)) reasonList.push('不在統計期間');
  if(isRewardExternalCountyCase(c)) reasonList.push('外縣市不列入計分');
  if(isRewardInstantSoldCase(c)) reasonList.push('進案即售出不列入計算');
  if(!developers.length) reasonList.push('未填開發業務');
  if(!contractType) reasonList.push('未判斷契種');
  if(!getMinEntrustMonthsQualified(c,3)) reasonList.push('委託未滿3個月');
  if(!shelfDate) reasonList.push('架上未填日期');
  if(basePriceWan <= 0) reasonList.push('未填底價');
  if(percent <= 0) reasonList.push('未填%數');
  let basePoints = 0, isHalf = false;
  if(contractType){
    basePoints = isSpecial ? 2.5 : 1;
    if(!isSpecial){
      if(basePriceWan > 0 && basePriceWan < 300) reasonList.push('一般約底價未滿300萬');
      if(percent > 0 && percent < 3) reasonList.push('一般約%數未滿3%');
    } else if((basePriceWan > 0 && basePriceWan < 300) || (percent > 0 && percent < 3)) isHalf = true;
  }
  const eligible = !reasonList.length;
  const totalPoints = eligible ? (isHalf ? 1.25 : basePoints) : 0;
  const splitCount = Math.max(developers.length,1);
  const sharePoint = totalPoints > 0 ? totalPoints / splitCount : 0;
  return { id:c.id, caseName:caseNameOf(c), developerText:fieldText(c,'developer') || '—', entryDate:entryDate||'—', contractType:contractType||'—', shelfDate:shelfDate||'—', eligible, isHalf, totalPoints, allocations:developers.map(name => ({name,score:sharePoint})) };
}
function computeRewardStats(){
  ensureRewardConfig();
  const cfg = state.rewardConfig;
  const cases = Array.isArray(state.cases) ? state.cases : [];
  const caseResults = cases.map(c => getRewardCaseResult(c,cfg));
  const personMap = new Map();
  const explicitRosterSet = new Set(getRewardExplicitRosterNames());
  getRewardRosterNames().forEach(name => personMap.set(name,{name,score:0,cases:0}));
  caseResults.forEach(row => row.allocations.forEach(item => {
    const cleanName = canonicalDeveloperName(item.name);
    if(!cleanName) return;
    if(isRewardAutoExcludedName(cleanName) && !explicitRosterSet.has(cleanName)) return;
    if(!personMap.has(cleanName)) personMap.set(cleanName,{name:cleanName,score:0,cases:0});
    const t = personMap.get(cleanName);
    t.score += Number(item.score||0);
    if(Number(item.score||0)>0) t.cases += 1;
  }));
  const totalPoints = [...personMap.values()].reduce((sum,item)=>sum+Number(item.score||0),0);
  const participationFee = Math.max(0, Number(cfg.participationFee || 0));
  const companyBonus = Math.max(0, Number(cfg.companyBonus || 0));
  const contributionNames = getRewardContributionNames();
  const participationTotal = contributionNames.length * participationFee;
  const totalBonusPool = participationTotal + companyBonus;
  const rankings = [...personMap.values()].map(item => {
    const score = Math.round((Number(item.score)||0)*100)/100;
    const bonusReward = totalPoints > 0 ? (score / totalPoints) * totalBonusPool : 0;
    return { name:item.name, score, cases:item.cases, qualified:score >= Number(cfg.rankingThreshold || 0), bonusReward, totalReward:bonusReward };
  }).sort((a,b)=>(b.score-a.score)||(getRewardSortIndex(a.name)-getRewardSortIndex(b.name))||String(a.name).localeCompare(String(b.name),'zh-Hant'));
  let displayRank = 0, previousQualifiedScore = null;
  rankings.forEach(row => { if(row.qualified){ if(previousQualifiedScore===null || row.score!==previousQualifiedScore) displayRank += 1; row.rank = displayRank; previousQualifiedScore = row.score; } else row.rank = null; });
  return { cfg, totalPoints, participationFee, companyBonus, contributionNames, contributionCount:contributionNames.length, participationTotal, totalBonusPool, rankings, publicRows:rankings.filter(x=>x.qualified).map(row=>({rank:row.rank,name:row.name,score:row.score})), scoreRows:rankings.map(row=>({rank:row.rank,name:row.name,score:row.score,qualified:row.qualified})), zeroRows:rankings.filter(x=>x.score<=0), eligibleCases:caseResults.filter(x=>x.eligible).length };
}
function getRewardChartMax(rows,minValue){ const scores=(Array.isArray(rows)?rows:[]).map(row=>Number(row.score||0)).filter(Number.isFinite); const maxScore=Math.max(Number(minValue||0),...scores,0); return Math.max(2,Math.ceil(maxScore/2)*2); }
function getRewardChartColor(index){ const palette=['#e11d48','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#6366f1','#8b5cf6','#ec4899','#14b8a6','#84cc16','#f43f5e']; return palette[index % palette.length]; }
function buildRewardColumnChart(rows, emptyText, options={}){
  const list = Array.isArray(rows) ? rows : [];
  if(!list.length) return `<div class="note">${escapeHtml(emptyText)}</div>`;
  const maxScore = getRewardChartMax(list, options.minValue || 0);
  const ticks=[]; for(let v=0; v<=maxScore; v+=2) ticks.push(v);
  const chartHeight=260, top=18, left=44, right=16, bottom=56;
  const slot=Math.max(58,Math.min(84,Math.floor(540/Math.max(list.length,1))));
  const plotWidth=Math.max(300,list.length*slot), width=left+plotWidth+right, height=top+chartHeight+bottom;
  const barWidth=Math.min(40,Math.max(22,slot*.48));
  const itemsSvg=list.map((row,idx)=>{
    const score=Number(row.score||0), xCenter=left+(idx+.5)*(plotWidth/list.length), x=xCenter-barWidth/2;
    const barHeight=maxScore>0?(score/maxScore)*chartHeight:0, y=top+chartHeight-barHeight;
    const line1=options.showStatus ? (row.rank ? `第${row.rank}名` : (score>0?'追分中':'加油')) : '';
    return `<g><rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${barHeight.toFixed(1)}" fill="${getRewardChartColor(idx)}" opacity="0.96"></rect>${line1?`<text x="${xCenter.toFixed(1)}" y="${top+chartHeight+18}" text-anchor="middle" font-size="11" font-weight="900" fill="#64748b">${escapeHtml(line1)}</text>`:''}<text x="${xCenter.toFixed(1)}" y="${top+chartHeight+36}" text-anchor="middle" font-size="12" font-weight="900" fill="#0f172a">${escapeHtml(String(row.name||''))}</text></g>`;
  }).join('');
  const gridSvg=ticks.map(v=>{ const y=top+chartHeight-((v/maxScore)*chartHeight); return `<g><line x1="${left}" y1="${y.toFixed(1)}" x2="${left+plotWidth}" y2="${y.toFixed(1)}" stroke="#cbd5e1" stroke-width="1"></line><text x="${left-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="12" font-weight="900" fill="#64748b">${v===0?'0':`${v}分`}</text></g>`; }).join('');
  const axisSvg=`<line x1="${left}" y1="${top}" x2="${left}" y2="${top+chartHeight}" stroke="#94a3b8" stroke-width="1.5"></line><line x1="${left}" y1="${top+chartHeight}" x2="${left+plotWidth}" y2="${top+chartHeight}" stroke="#94a3b8" stroke-width="1.5"></line>`;
  return `<div class="column-chart"><div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="柱狀圖">${gridSvg}${axisSvg}${itemsSvg}</svg></div></div>`;
}
function getRewardRankBadge(row){ if(!row || !row.rank) return '—'; if(row.rank===1) return '🥇'; if(row.rank===2) return '🥈'; if(row.rank===3) return '🥉'; return String(row.rank); }
function buildRewardRankList(rows, emptyText){ const list=Array.isArray(rows)?rows:[]; if(!list.length) return `<div class="note">${escapeHtml(emptyText)}</div>`; return `<div class="rank-list">${list.map(row=>{ const topClass=row.rank===1?'top1':row.rank===2?'top2':row.rank===3?'top3':''; return `<div class="rank-row ${topClass}"><span class="rank">${escapeHtml(getRewardRankBadge(row))}</span><span class="name">${escapeHtml(row.name)}</span><span class="score">${escapeHtml(formatRewardScore(row.score))}分</span></div>`; }).join('')}</div>`; }
function buildPosterMarkup(data){
  const rankListHtml=buildRewardRankList(data.publicRows||[],`目前尚無符合${formatRewardScore(data.cfg?.rankingThreshold||0)}分門檻的排名資料`);
  const scoreChartHtml=buildRewardColumnChart(data.scoreRows||[],'目前尚無人員分數資料',{minValue:data.cfg?.rankingThreshold||0,showStatus:false});
  const totalText=data.totalPoints>0?`總分:${escapeHtml(formatRewardScore(data.totalPoints))}分`:'總分:-分';
  return `<div class="poster-head"><div class="poster-title">開發月獎勵排行榜</div><div class="poster-sub">統計期間｜${escapeHtml(getRewardPeriodLabel(data.cfg))}</div></div><div class="poster-card"><div class="poster-card-head"><h4>📌 目前排行</h4><div class="totalbadge">${totalText}</div></div>${rankListHtml}</div><div class="poster-card"><div class="poster-card-head"><h4>📊 目前人員排序</h4></div>${scoreChartHtml}</div><div class="poster-card rule-card"><div class="poster-card-head"><h4>📣 公告辦法</h4></div><ol class="public-rules"><li>物件須配合團看才可記分。</li><li>進案即售出，不列入計算。</li></ol><div class="public-disclaimer">公告辦法，本公司保有決定取消、終止、修改或暫停之權利。</div></div>`;
}
function setStatus(kind,text){ const el=document.getElementById('statusBadge'); el.className='badge '+kind; el.textContent=text; }
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso); if(Number.isNaN(d.getTime())) return '—'; const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
async function loadRemote(){
  if(!client) return;
  try{
    const { data, error } = await client.from(TABLE_NAME).select('app_id,data,revision,updated_at').eq('app_id',APP_ID).maybeSingle();
    if(error) throw error;
    if(!data || !data.data) throw new Error('Supabase 找不到資料，請確認主檔案已連線並同步。');
    state = data.data;
    ensureRewardConfig();
    document.getElementById('poster').innerHTML = buildPosterMarkup(computeRewardStats());
    setStatus('ok','已連線更新');
    document.getElementById('lastUpdateBadge').textContent = '最後更新：' + fmtDateTime(data.updated_at || new Date().toISOString());
  }catch(err){
    console.error(err);
    setStatus('err','讀取失敗');
    document.getElementById('poster').innerHTML = `<div class="poster-head"><div class="poster-title">開發月獎勵排行榜</div><div class="poster-sub">讀取失敗</div></div><div class="poster-card"><div class="note">${escapeHtml(err.message || String(err))}</div></div>`;
  }
}
function startTimer(){
  clearInterval(timer); clearInterval(countTimer);
  nextAt = Date.now() + AUTO_REFRESH_MS;
  timer = setInterval(() => { loadRemote(); nextAt = Date.now() + AUTO_REFRESH_MS; }, AUTO_REFRESH_MS);
  countTimer = setInterval(() => { const sec = Math.max(0, Math.ceil((nextAt - Date.now())/1000)); document.getElementById('nextUpdateBadge').textContent = `每30秒自動更新｜${sec}秒後刷新`; }, 1000);
}
function connect(url,key,saveLocal=false){
  if(!url || !key){ document.getElementById('setupBox').classList.add('show'); setStatus('warn','請填 Supabase'); return; }
  if(!window.supabase?.createClient){ setStatus('err','Supabase套件未載入'); return; }
  client = window.supabase.createClient(url,key);
  if(saveLocal){ localStorage.setItem(LS_URL,url); localStorage.setItem(LS_KEY,key); }
  setStatus('warn','連線中...');
  loadRemote(); startTimer();
}
function buildConfiguredHtml(url,key){
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/const SUPABASE_URL = '[^']*';/, `const SUPABASE_URL = '${url.replace(/'/g,"\\'")}';`);
  html = html.replace(/const SUPABASE_KEY = '[^']*';/, `const SUPABASE_KEY = '${key.replace(/'/g,"\\'")}';`);
  html = html.replace(/<section id="setupBox" class="setup show">/, '<section id="setupBox" class="setup">');
  return html;
}
function downloadConfigured(){
  const url = document.getElementById('urlInput').value.trim();
  const key = document.getElementById('keyInput').value.trim();
  if(!url || !key){ alert('請先貼上 Supabase URL 與 Publishable Key。'); return; }
  const blob = new Blob([buildConfiguredHtml(url,key)], { type:'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function init(){
  const url = SUPABASE_URL || localStorage.getItem(LS_URL) || '';
  const key = SUPABASE_KEY || localStorage.getItem(LS_KEY) || '';
  document.getElementById('urlInput').value = url;
  document.getElementById('keyInput').value = key;
  document.getElementById('connectBtn').onclick = () => connect(document.getElementById('urlInput').value.trim(), document.getElementById('keyInput').value.trim(), true);
  document.getElementById('downloadConfiguredBtn').onclick = downloadConfigured;
  if(SUPABASE_URL && SUPABASE_KEY){ document.getElementById('setupBox').classList.remove('show'); connect(SUPABASE_URL,SUPABASE_KEY,false); }
  else { document.getElementById('setupBox').classList.add('show'); if(url && key) connect(url,key,false); }
}
init();
</script>
